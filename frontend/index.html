    <script>
      try {
        var dm = localStorage.getItem('hm_dark_mode');
        var dark = dm != null ? dm === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
