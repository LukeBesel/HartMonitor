# ─── Render.com blueprint ─────────────────────────────────────────────────────
# One-click-ish deploy on Render using the Dockerfile, with a persistent disk
# mounted at /data for the SQLite database + backups. Import this repo as a
# "Blueprint" in the Render dashboard.

services:
  - type: web
    name: hartmonitor
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter            # smallest paid plan; needed for a persistent disk
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: hartmonitor-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/mes.db
      - key: BACKUP_DIR
        value: /data/backups
      # Set APP_URL to your real URL after the first deploy (e.g.
      # https://hartmonitor.onrender.com), then redeploy.
      - key: APP_URL
        sync: false
      # Optional integrations — add in the dashboard when you go live.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
