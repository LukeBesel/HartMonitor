services:
  - type: web
    name: hartmonitor-production
    env: node
    region: oregon
    plan: starter
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && npm ci
    startCommand: cd backend && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_PATH
        value: /data/mes.db
      - key: BACKUP_DIR
        value: /data/backups
      - key: SEED_DEMO_DATA
        value: 'false'
      # All other vars set manually in Render dashboard (secrets)
    disk:
      name: mes-data
      mountPath: /data
      sizeGB: 5

  - type: web
    name: hartmonitor-staging
    env: node
    region: oregon
    plan: starter
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && npm ci
    startCommand: cd backend && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_PATH
        value: /data/mes.db
      - key: BACKUP_DIR
        value: /data/backups
      - key: SEED_DEMO_DATA
        value: 'true'
    disk:
      name: mes-staging-data
      mountPath: /data
      sizeGB: 1
