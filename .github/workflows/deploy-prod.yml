name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.hartmonitor.io
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render (production)
        if: ${{ vars.RENDER_SERVICE_ID_PROD != '' }}
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ vars.RENDER_SERVICE_ID_PROD }}
        run: |
          curl --fail -s -X POST \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "Deploy triggered for production service $SERVICE_ID"

      - name: Health check
        if: ${{ vars.RENDER_SERVICE_ID_PROD != '' }}
        run: |
          echo "Waiting for production deploy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf https://app.hartmonitor.io/api/health 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unreachable")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "ok" ]; then
              echo "Production deploy healthy!"
              exit 0
            fi
            sleep 20
          done
          echo "Production health check timed out" && exit 1
