name: Production health check

# Railway auto-deploys the `main` branch to the production service (configured in
# the Railway dashboard). This workflow does NOT trigger the deploy — it waits for
# Railway to finish, then verifies the production URL is healthy. Set the repo
# variable PROD_URL (Settings → Secrets and variables → Actions → Variables) to
# your production URL, e.g. https://app.yourdomain.com. If unset, this is a no-op
# so the workflow never fails before production exists.

on:
  push:
    branches: [main]

jobs:
  health:
    name: Verify production is healthy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway deploy, then health-check
        if: ${{ vars.PROD_URL != '' }}
        run: |
          echo "Waiting for Railway to deploy ${{ vars.PROD_URL }} ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "${{ vars.PROD_URL }}/api/health" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null \
              || echo "unreachable")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "ok" ]; then
              echo "✅ Production is healthy."
              exit 0
            fi
            sleep 20
          done
          echo "❌ Production health check timed out" && exit 1

      - name: Skipped (no PROD_URL set)
        if: ${{ vars.PROD_URL == '' }}
        run: echo "PROD_URL not set — skipping health check. Set it once the production service is live."
