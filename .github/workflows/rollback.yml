name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Git commit SHA to roll back to'
        required: true
      environment:
        description: 'Environment to roll back'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  rollback:
    name: Rollback ${{ inputs.environment }} to ${{ inputs.commit_sha }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Trigger rollback deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ inputs.environment == 'production' && vars.RENDER_SERVICE_ID_PROD || vars.RENDER_SERVICE_ID_STAGING }}
        run: |
          curl --fail -s -X POST \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"${{ inputs.commit_sha }}\"}"
          echo "Rollback triggered to ${{ inputs.commit_sha }} on ${{ inputs.environment }}"
